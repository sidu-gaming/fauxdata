name: orders
description: "Ordini e-commerce"
rows: 500
seed: 123

output:
  format: csv
  path: tmp/orders.csv

columns:
  order_id:
    type: int
    unique: true
    min: 10000
    max: 99999

  customer_id:
    type: int
    min: 1
    max: 5000

  product:
    type: string
    values: [Laptop, Phone, Tablet, Monitor, Keyboard, Mouse, Headset, Webcam, Charger, Cable]

  amount:
    type: float
    min: 5.0
    max: 2000.0

  status:
    type: string
    values: [pending, confirmed, shipped, delivered, cancelled]

  created_at:
    type: datetime
    min: "2023-01-01T00:00:00"
    max: "2024-12-31T23:59:59"

validation:
  - rule: col_vals_not_null
    columns: [order_id, customer_id, product, amount, status]
  - rule: rows_distinct
    columns: [order_id]
  - rule: col_vals_between
    column: amount
    min: 5.0
    max: 2000.0
  - rule: col_vals_in_set
    column: status
    values: [pending, confirmed, shipped, delivered, cancelled]
